<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FROM — Survive &amp; Solve</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bark:#241a12; --bark-soft:#3a2c20;
    --parchment:#e7d8ba; --parchment-deep:#d8c39c;
    --lantern:#d99a3c; --lantern-bright:#f0bd5e;
    --moss:#5a6b4a; --ember:#c8612f;
    --void:#06060a; --bonenight:#15171f;
    --moon:#cdd3df; --moon-dim:#8a91a2;
    --eye:#d11f1f; --eye-glow:#ff3b3b;
    --talisman:#e6b450; --talisman-bright:#ffd97a;
    --serif:"EB Garamond", Georgia, serif;
    --display:"IM Fell English", Georgia, serif;
    --displaysc:"IM Fell English SC", Georgia, serif;
    --hand:"Kalam","Comic Sans MS",cursive;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--serif);background:var(--void);color:var(--moon);
    -webkit-font-smoothing:antialiased;overflow-x:hidden;line-height:1.6}

  #bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 800ms ease}
  #bg.show{opacity:1}
  #grain{position:fixed;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 260px 70px rgba(0,0,0,.7)}
  #grain.danger{box-shadow:inset 0 0 200px 50px rgba(120,0,0,.35),inset 0 0 320px 90px rgba(0,0,0,.7);animation:pulse 3.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:inset 0 0 200px 50px rgba(120,0,0,.28),inset 0 0 320px 90px rgba(0,0,0,.72)}
    50%{box-shadow:inset 0 0 180px 40px rgba(150,0,0,.42),inset 0 0 320px 90px rgba(0,0,0,.7)}}

  #stage{position:relative;z-index:2;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column}
  .wrap{width:100%;max-width:860px;margin:0 auto;padding:clamp(18px,3.5vw,40px);flex:1;display:flex;flex-direction:column}

  .status{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:10px 14px;margin-bottom:6px;border-radius:6px;
    background:rgba(8,8,12,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08)}
  .daylight{display:flex;align-items:center;gap:9px}
  .daylight .lbl,.journal-tab .lbl,.talisman-hud .lbl{font-family:var(--displaysc);font-size:.8rem;letter-spacing:.07em;opacity:.85}
  .lantern-row{display:flex;gap:6px}
  .lant{width:15px;height:21px;display:block;transition:opacity 600ms ease,filter 600ms ease}
  .lant.out{opacity:.2;filter:grayscale(1)}
  .journal-tab{display:flex;align-items:center;gap:8px;background:none;border:none;color:inherit;cursor:pointer;font-family:inherit;padding:4px}
  .journal-tab .count{font-family:var(--display);font-size:1.1rem;border:1px solid rgba(255,255,255,.4);border-radius:3px;padding:1px 9px}
  .journal-tab:hover{opacity:.7}
  .talisman-hud{display:flex;align-items:center;gap:10px}

  .scene{flex:1;display:flex;flex-direction:column;justify-content:center;padding:clamp(14px,4vh,40px) 0}
  .scene.bottom{justify-content:flex-end}

  .eyebrow{font-family:var(--displaysc);letter-spacing:.2em;text-transform:uppercase;font-size:.76rem;opacity:.7;margin-bottom:16px;text-shadow:0 1px 8px #000}
  .title{font-family:var(--display);font-weight:400;line-height:.96;font-size:clamp(3rem,10vw,5.4rem);letter-spacing:.01em;text-shadow:0 2px 30px rgba(0,0,0,.9)}
  .title .sub{display:block;font-family:var(--displaysc);font-size:clamp(1rem,3.4vw,1.4rem);letter-spacing:.24em;margin-top:18px;opacity:.85}

  .panel{background:rgba(8,8,12,.62);backdrop-filter:blur(3px);border:1px solid rgba(255,255,255,.09);border-radius:9px;padding:clamp(18px,3vw,26px)}
  .lede{font-size:clamp(1.08rem,2.6vw,1.34rem);max-width:56ch;font-style:italic;opacity:.95;text-shadow:0 1px 10px #000}
  .narr{font-size:clamp(1.06rem,2.4vw,1.22rem);max-width:62ch}
  .narr p{margin-bottom:1rem}
  .narr p:last-child{margin-bottom:0}
  .narr p.lead::first-letter{font-family:var(--display);font-size:3em;line-height:.7;float:left;padding:.06em .12em 0 0;color:var(--lantern)}
  .night .narr p.lead::first-letter{color:var(--eye)}

  .actions{margin-top:26px;display:flex;flex-wrap:wrap;gap:12px}
  .btn{font-family:var(--displaysc);letter-spacing:.05em;font-size:1.06rem;padding:13px 28px;cursor:pointer;
    background:rgba(10,10,14,.5);color:var(--moon);border:1px solid rgba(255,255,255,.55);border-radius:3px;
    transition:background 220ms ease,color 220ms ease,border-color 220ms,transform 120ms ease;text-shadow:0 1px 6px #000}
  .btn:hover{background:var(--moon);color:var(--void);border-color:var(--moon)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--lantern-bright);outline-offset:3px}
  .btn.ghost{border-color:transparent;background:none;opacity:.78;text-decoration:underline;text-underline-offset:5px}
  .btn.ghost:hover{background:none;color:var(--moon);opacity:1}
  .btn.warm{border-color:var(--lantern);color:var(--lantern-bright)}
  .btn.warm:hover{background:var(--lantern);color:var(--void)}

  /* level menu */
  .lvl-list{margin-top:26px;display:flex;flex-direction:column;gap:12px;max-width:580px}
  .lvl{display:flex;align-items:center;gap:16px;text-align:left;cursor:pointer;
    background:rgba(8,8,12,.55);border:1px solid rgba(255,255,255,.16);border-radius:8px;color:inherit;font-family:inherit;
    padding:16px 18px;transition:transform .15s,border-color .2s,background .2s}
  .lvl:hover{transform:translateX(4px);border-color:var(--lantern);background:rgba(8,8,12,.78)}
  .lvl:focus-visible{outline:2px solid var(--lantern-bright);outline-offset:2px}
  .lvl.locked{opacity:.5;cursor:default}
  .lvl-num{font-family:var(--display);font-size:2rem;line-height:1;width:1.6em;text-align:center;opacity:.85}
  .lvl-meta{flex:1;display:flex;flex-direction:column}
  .lvl-title{font-family:var(--display);font-size:1.5rem;line-height:1.1}
  .lvl-tag{font-size:.96rem;font-style:italic;opacity:.78}
  .lvl-state{font-family:var(--displaysc);letter-spacing:.08em;font-size:.82rem;white-space:nowrap}
  .lvl-state.go{color:var(--lantern-bright)}
  .lvl-state.done{color:var(--moss)}
  .lvl-state.lock{opacity:.7}
  .hub-foot{margin-top:20px;font-family:var(--displaysc);letter-spacing:.1em;font-size:.78rem;opacity:.5;text-shadow:0 1px 8px #000}

  /* NPC cards */
  .npc-grid{margin-top:22px;display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .npc{display:flex;flex-direction:column;text-align:left;cursor:pointer;padding:0;overflow:hidden;
    background:rgba(8,8,12,.5);border:1px solid rgba(255,255,255,.14);border-radius:8px;color:inherit;font-family:inherit;
    transition:transform 160ms ease,border-color 200ms,box-shadow 200ms}
  .npc:hover{transform:translateY(-4px);border-color:var(--lantern);box-shadow:0 14px 30px rgba(0,0,0,.5)}
  .npc:focus-visible{outline:2px solid var(--lantern-bright);outline-offset:2px}
  .npc-portrait{height:172px;background-size:cover;border-bottom:1px solid rgba(0,0,0,.4);position:relative}
  .npc-portrait::after{content:"";position:absolute;inset:0;box-shadow:inset 0 -40px 40px -10px rgba(8,8,12,.9)}
  .npc-meta{padding:12px 16px 15px}
  .npc .nm{font-family:var(--display);font-size:1.5rem;line-height:1.05}
  .npc .role{font-size:.95rem;font-style:italic;opacity:.8;margin-top:3px}
  .npc.spent,.npc.locked{opacity:.5;cursor:default;pointer-events:none}
  .npc.spent .npc-portrait,.npc.locked .npc-portrait{filter:grayscale(.7) brightness(.7)}
  .npc.suspect .nm::after{content:" ?";color:var(--ember);font-style:normal}
  .npc .done-mark{display:none;font-family:var(--displaysc);font-size:.76rem;letter-spacing:.1em;margin-top:8px;color:var(--moss)}
  .npc.spent .done-mark{display:block}
  .npc.locked .done-mark{display:block;color:var(--ember)}

  /* conversation */
  .vn-tag{font-family:var(--displaysc);letter-spacing:.2em;text-transform:uppercase;font-size:.74rem;opacity:.7;margin-bottom:10px;text-shadow:0 1px 8px #000}
  .dialogue{background:linear-gradient(rgba(8,8,12,.72),rgba(8,8,12,.82));backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:clamp(18px,3vw,26px);box-shadow:0 18px 50px rgba(0,0,0,.6)}
  .speaker{font-family:var(--display);font-size:1.6rem;color:var(--lantern-bright);margin-bottom:.35rem;text-shadow:0 1px 10px #000}
  .dialogue .line{font-size:clamp(1.06rem,2.4vw,1.22rem);margin-bottom:.8rem}
  .dialogue .line:last-of-type{margin-bottom:0}

  /* journal drawer */
  .journal-back{position:fixed;inset:0;z-index:40;background:rgba(6,6,10,.6);opacity:0;visibility:hidden;transition:opacity 280ms ease}
  .journal-back.open{opacity:1;visibility:visible}
  .journal{position:fixed;top:0;right:0;bottom:0;z-index:41;width:min(420px,90vw);
    background:radial-gradient(130% 100% at 80% 0%,#efe2c6 0%,var(--parchment) 55%,var(--parchment-deep) 100%);
    color:var(--bark);box-shadow:-18px 0 50px rgba(0,0,0,.6);transform:translateX(102%);
    transition:transform 360ms cubic-bezier(.2,.7,.2,1);padding:26px 24px;overflow-y:auto;border-left:3px solid var(--bark-soft)}
  .journal.open{transform:translateX(0)}
  .journal h2{font-family:var(--display);font-weight:400;font-size:1.7rem;border-bottom:1px solid var(--bark-soft);
    padding-bottom:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
  .journal .sub{font-family:var(--displaysc);font-size:.8rem;letter-spacing:.1em;opacity:.7}
  .journal-close{background:none;border:none;font-family:var(--display);font-size:1.5rem;cursor:pointer;color:var(--bark);line-height:1}
  .frag{font-family:var(--hand);border-bottom:1px dashed rgba(36,26,18,.35);padding:16px 2px}
  .frag .tag{font-family:var(--displaysc);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;opacity:.7;display:block;margin-bottom:4px}
  .frag .who{font-size:.95rem;opacity:.7;font-style:italic}
  .frag .txt{font-size:1.18rem;line-height:1.45;margin-top:3px}
  .frag.false{color:var(--ember)}
  .frag.false .txt::after{content:" — does this hold up?";font-size:.85rem;opacity:.8}
  .journal .empty{font-family:var(--hand);font-size:1.15rem;opacity:.6;padding:24px 2px}

  /* talisman */
  .charm .seg{fill:none;stroke:var(--moon-dim);stroke-width:2.5;opacity:.4;transition:stroke 700ms ease,opacity 700ms,filter 700ms}
  .charm .seg.lit{stroke:var(--talisman);opacity:1;filter:drop-shadow(0 0 5px var(--talisman-bright))}
  .charm .core{fill:rgba(20,20,28,.6);stroke:var(--moon-dim);stroke-width:2;opacity:.5;transition:all 700ms}
  .charm.whole .core{fill:#3a2c10;stroke:var(--talisman);opacity:1;filter:drop-shadow(0 0 8px var(--talisman-bright))}
  .charm-big{margin:4px 0}

  /* night questions */
  .q-progress{font-family:var(--displaysc);letter-spacing:.14em;font-size:.82rem;opacity:.75;margin-bottom:12px;text-shadow:0 1px 8px #000}
  .q-prompt{font-family:var(--display);font-size:clamp(1.6rem,5vw,2.3rem);line-height:1.12;max-width:22ch;text-shadow:0 2px 20px #000}
  .opts{margin-top:22px;display:flex;flex-direction:column;gap:11px;max-width:640px}
  .opt{text-align:left;font-family:var(--serif);font-size:1.1rem;background:rgba(8,8,12,.62);backdrop-filter:blur(3px);
    border:1px solid rgba(205,211,223,.4);border-radius:4px;color:var(--moon);padding:14px 18px;cursor:pointer;
    transition:background 180ms,border-color 180ms,transform 120ms}
  .opt:hover{background:rgba(230,180,80,.18);border-color:var(--talisman);transform:translateX(3px)}
  .opt:focus-visible{outline:2px solid var(--talisman-bright);outline-offset:2px}
  .opt.correct{border-color:var(--talisman);background:rgba(230,180,80,.22);color:var(--talisman-bright)}
  .opt.wrong{border-color:var(--eye);background:rgba(209,31,31,.2);color:var(--eye-glow)}
  .opt:disabled{cursor:default}
  .verdict{margin-top:20px;font-style:italic;font-size:1.12rem;min-height:1.4em;opacity:0;transition:opacity 500ms ease;text-shadow:0 1px 10px #000;max-width:60ch}
  .verdict.show{opacity:1}
  .verdict.good{color:var(--talisman-bright)}
  .verdict.bad{color:var(--eye-glow)}
  .ref-toggle{margin-top:16px;background:none;border:none;cursor:pointer;font-family:var(--displaysc);letter-spacing:.08em;font-size:.82rem;color:var(--moon-dim);text-decoration:underline;text-underline-offset:4px}
  .ref-toggle:hover{color:var(--moon)}

  .end-head{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:6px}

  .fade{animation:fade 800ms ease both}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  .footer-note{text-align:center;font-family:var(--displaysc);font-size:.72rem;letter-spacing:.12em;opacity:.4;padding:12px 0 8px;position:relative;z-index:2;text-shadow:0 1px 6px #000}

  #soundBtn{position:fixed;right:16px;bottom:14px;z-index:30;width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--moon);
    background:rgba(8,8,12,.6);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(4px);
    transition:background .2s,color .2s,transform .12s}
  #soundBtn:hover{background:rgba(8,8,12,.88);color:var(--lantern-bright)}
  #soundBtn:active{transform:scale(.94)}
  #soundBtn:focus-visible{outline:2px solid var(--lantern-bright);outline-offset:2px}

  /* level 2 — memory board */
  .mboard{margin:24px 0 8px;display:grid;grid-template-columns:repeat(2,1fr);gap:14px;max-width:340px}
  .mtile{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:rgba(8,8,12,.55);border:1px solid rgba(255,255,255,.18);border-radius:12px;color:inherit;font-family:inherit;
    transition:transform .1s ease,box-shadow .25s,border-color .25s,background .25s}
  .mtile svg{width:46%;height:46%;stroke:var(--moon);fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round;opacity:.82;transition:stroke .2s,opacity .2s}
  .mtile:hover{border-color:var(--lantern)}
  .mtile:focus-visible{outline:2px solid var(--lantern-bright);outline-offset:2px}
  .mtile.flash{background:rgba(230,180,80,.30);border-color:var(--talisman-bright);box-shadow:0 0 26px 5px rgba(255,217,122,.55);transform:scale(1.05)}
  .mtile.flash svg{stroke:var(--talisman-bright);opacity:1}
  .mboard.locked .mtile{cursor:default}
  .mem-hud{display:flex;align-items:center;gap:9px}
  .mem-pip{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--moon-dim);opacity:.5;transition:all .5s ease}
  .mem-pip.lit{background:var(--talisman);border-color:var(--talisman-bright);opacity:1;box-shadow:0 0 9px var(--talisman-bright)}
  .watch-tag{margin-top:6px;font-family:var(--displaysc);letter-spacing:.1em;font-size:.95rem;opacity:.88;min-height:1.5em;text-shadow:0 1px 8px #000}
  @media(max-width:420px){.mboard{max-width:280px}}
  @media(max-width:560px){.npc-grid{grid-template-columns:1fr}}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}#grain.danger{animation:none}}
</style>
</head>
<body>
  <div id="bg"></div>
  <div id="grain"></div>
  <div id="stage"><div class="wrap" id="appWrap"><div id="app"></div></div>
    <div class="footer-note">no road leads out · the trees keep watch</div>
  </div>

  <button id="soundBtn" aria-label="Toggle sound" title="Sound on / off"></button>

  <div class="journal-back" id="journalBack"></div>
  <aside class="journal" id="journal" aria-label="Notebook">
    <h2><span id="journalTitle">Journal</span> <button class="journal-close" id="journalClose" aria-label="Close">×</button></h2>
    <div class="sub" id="journalSub">&nbsp;</div>
    <div id="journalBody"></div>
  </aside>

  <!-- Engine, then auto-load levels/level1.js, level2.js, … in order.
       To add a level: drop levels/levelN.js (next number, no gaps) and its art in assets/.
       You never need to edit this file again. -->
  <script src="engine.js"></script>
  <script>
  /* AUTO-LOADER — loads levels/level1.js, level2.js, … until one is missing, then boots. */
  (function(){
    var booted=false;
    function boot(){ if(booted) return; booted=true; if(window.Engine) Engine.boot(); }
    function load(n){
      var s=document.createElement("script");
      s.src="levels/level"+n+".js";
      s.onload=function(){ load(n+1); };
      s.onerror=boot;
      document.head.appendChild(s);
    }
    load(1);
  })();
  </script>
</body>
</html>
